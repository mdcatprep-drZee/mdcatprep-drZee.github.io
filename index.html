<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDCAT Physics вАФ Numerical MCQs</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a40;
    --accent: #00e5ff;
    --accent2: #ff4d6d;
    --accent3: #b8ff57;
    --text: #e8e8f0;
    --muted: #6a6a88;
    --correct: #b8ff57;
    --wrong: #ff4d6d;
    --option-hover: #22223a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,77,109,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 50px;
  }

  .badge {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 5px 16px;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: clamp(32px, 6vw, 54px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1px;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-top: 12px;
    font-family: 'Space Mono', monospace;
  }

  /* SCOREBAR */
  .scorebar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 24px;
    margin-bottom: 36px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .score-item {
    text-align: center;
  }

  .score-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }

  .score-val {
    font-size: 26px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .score-val.wrong-val { color: var(--wrong); }
  .score-val.neutral-val { color: var(--text); }

  .progress-wrap {
    flex: 1;
    min-width: 160px;
  }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* CATEGORY TABS */
  .tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .tab {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 700; }

  /* QUESTION CARD */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 20px;
    animation: fadeSlide 0.35s ease;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .q-number {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .q-topic {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.2);
    padding: 4px 10px;
    border-radius: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .q-text {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 28px;
    color: var(--text);
  }

  .q-text .formula {
    font-family: 'Space Mono', monospace;
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.15);
    padding: 12px 16px;
    border-radius: 6px;
    display: block;
    margin: 12px 0;
    font-size: 15px;
    color: var(--accent);
    text-align: center;
  }

  /* OPTIONS */
  .options {
    display: grid;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    font-size: 15px;
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: var(--option-hover);
    transform: translateX(4px);
  }

  .option.correct {
    border-color: var(--correct);
    background: rgba(184,255,87,0.08);
    color: var(--correct);
  }

  .option.wrong {
    border-color: var(--wrong);
    background: rgba(255,77,109,0.08);
    color: var(--wrong);
  }

  .option.disabled { cursor: default; }

  .opt-key {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: var(--muted);
  }

  .option.correct .opt-key { border-color: var(--correct); color: var(--correct); background: rgba(184,255,87,0.15); }
  .option.wrong .opt-key { border-color: var(--wrong); color: var(--wrong); background: rgba(255,77,109,0.15); }
  .option:hover:not(.disabled) .opt-key { border-color: var(--accent); color: var(--accent); }

  /* EXPLANATION */
  .explanation {
    display: none;
    margin-top: 20px;
    padding: 16px 20px;
    background: rgba(0,229,255,0.05);
    border: 1px solid rgba(0,229,255,0.15);
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: var(--accent);
  }

  .explanation.show { display: block; animation: fadeSlide 0.3s ease; }
  .explanation strong { color: var(--accent3); display: block; margin-bottom: 6px; }

  /* NEXT BTN */
  .next-btn {
    display: none;
    margin-top: 20px;
    padding: 14px 32px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }

  .next-btn:hover { background: var(--accent3); transform: translateY(-2px); }
  .next-btn.show { display: inline-block; }

  /* RESULTS */
  #results {
    display: none;
    text-align: center;
    padding: 60px 40px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    animation: fadeSlide 0.4s ease;
  }

  .result-score {
    font-size: 80px;
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .result-label {
    font-size: 18px;
    color: var(--muted);
    margin-bottom: 32px;
    font-family: 'Space Mono', monospace;
  }

  .result-bars {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .result-bar-item { text-align: center; }
  .r-val { font-size: 36px; font-weight: 800; }
  .r-val.c { color: var(--correct); }
  .r-val.w { color: var(--wrong); }
  .r-lbl { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

  .restart-btn {
    padding: 14px 40px;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .restart-btn:hover { background: var(--accent); color: var(--bg); }

  @media (max-width: 600px) {
    .question-card { padding: 20px; }
    .q-text { font-size: 15px; }
    .option { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">MDCAT Prep 2025</div>
    <h1>Physics<br><span>Numerical MCQs</span></h1>
    <p class="subtitle">// 30 critical calculation-based questions</p>
  </header>

  <div class="scorebar">
    <div class="score-item">
      <span class="score-label">Score</span>
      <span class="score-val" id="scoreVal">0</span>
    </div>
    <div class="score-item">
      <span class="score-label">Correct</span>
      <span class="score-val" id="correctVal">0</span>
    </div>
    <div class="score-item">
      <span class="score-label">Wrong</span>
      <span class="score-val wrong-val" id="wrongVal">0</span>
    </div>
    <div class="score-item">
      <span class="score-label">Remaining</span>
      <span class="score-val neutral-val" id="remainVal">30</span>
    </div>
    <div class="progress-wrap">
      <span class="score-label">Progress</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="quizArea"></div>
  <div id="results">
    <div class="result-score" id="finalScore"></div>
    <div class="result-label">Final Score</div>
    <div class="result-bars">
      <div class="result-bar-item"><div class="r-val c" id="finalCorrect"></div><div class="r-lbl">Correct</div></div>
      <div class="result-bar-item"><div class="r-val w" id="finalWrong"></div><div class="r-lbl">Wrong</div></div>
      <div class="result-bar-item"><div class="r-val" id="finalPct" style="color:var(--accent)"></div><div class="r-lbl">Accuracy</div></div>
    </div>
    <button class="restart-btn" onclick="restart()">вЖї Restart Quiz</button>
  </div>

</div>

<script>
const questions = [
  // MECHANICS
  {cat:"Mechanics", q:"A car accelerates uniformly from rest to 72 km/h in 10 s. What is its acceleration?", opts:["1 m/s¬≤","2 m/s¬≤","7.2 m/s¬≤","0.5 m/s¬≤"], ans:1, exp:"v = 72 km/h = 20 m/s. a = ќФv/t = 20/10 = 2 m/s¬≤"},
  {cat:"Mechanics", q:"A body of mass 5 kg is acted upon by a net force of 20 N. What is its acceleration?", opts:["0.25 m/s¬≤","4 m/s¬≤","100 m/s¬≤","2.5 m/s¬≤"], ans:1, exp:"F = ma вЖТ a = F/m = 20/5 = 4 m/s¬≤"},
  {cat:"Mechanics", q:"A projectile is launched at 30¬∞ with 40 m/s. What is the maximum height? (g = 10 m/s¬≤)", opts:["20 m","40 m","10 m","80 m"], ans:0, exp:"H = v¬≤sin¬≤ќЄ / 2g = (40¬≤√Ч0.25)/(20) = 400/20 = 20 m"},
  {cat:"Mechanics", q:"A 2 kg block moves at 6 m/s. What is its kinetic energy?", opts:["12 J","36 J","6 J","72 J"], ans:1, exp:"KE = ¬љmv¬≤ = ¬љ √Ч 2 √Ч 36 = 36 J"},
  {cat:"Mechanics", q:"An object falls from rest through 20 m. What is its velocity just before impact? (g = 10 m/s¬≤)", opts:["10 m/s","20 m/s","14.1 m/s","200 m/s"], ans:1, exp:"v¬≤ = 2gh = 2 √Ч 10 √Ч 20 = 400 вЖТ v = 20 m/s"},
  {cat:"Mechanics", q:"A 10 kg object is lifted 5 m. What work is done against gravity? (g = 10 m/s¬≤)", opts:["50 J","500 J","5 J","5000 J"], ans:1, exp:"W = mgh = 10 √Ч 10 √Ч 5 = 500 J"},
  {cat:"Mechanics", q:"A satellite moves in a circle of radius 4√Ч10вБґ m with speed 8000 m/s. What is its centripetal acceleration?", opts:["0.016 m/s¬≤","16 m/s¬≤","1.6 m/s¬≤","160 m/s¬≤"], ans:1, exp:"a = v¬≤/r = (8000)¬≤/(4√Ч10вБґ) = 64√Ч10вБґ/4√Ч10вБґ = 16 m/s¬≤"},

  // WAVES & OSCILLATIONS
  {cat:"Waves", q:"A wave has frequency 500 Hz and wavelength 0.68 m. What is its speed?", opts:["340 m/s","0.00136 m/s","500 m/s","680 m/s"], ans:0, exp:"v = fќї = 500 √Ч 0.68 = 340 m/s"},
  {cat:"Waves", q:"A pendulum of length 1 m swings on Earth (g = 10 m/s¬≤). What is its time period?", opts:["2ѕА s","ѕА s","вИЪ2ѕА s","ѕА/2 s"], ans:0, exp:"T = 2ѕАвИЪ(L/g) = 2ѕАвИЪ(1/10) = 2ѕА/вИЪ10 вЙИ 2ѕА √Ч 0.316 вЙИ 1.99 s вЙИ 2ѕА/вИЪ10. Closest is 2ѕА s (approx)"},
  {cat:"Waves", q:"The frequency of a sound wave in air is 330 Hz. If speed of sound is 330 m/s, what is the wavelength?", opts:["1 m","100 m","0.1 m","10 m"], ans:0, exp:"ќї = v/f = 330/330 = 1 m"},
  {cat:"Waves", q:"A spring of force constant 200 N/m is compressed by 0.05 m. What is the elastic PE stored?", opts:["0.25 J","5 J","0.5 J","10 J"], ans:0, exp:"PE = ¬љkx¬≤ = ¬љ √Ч 200 √Ч 0.0025 = 0.25 J"},
  {cat:"Waves", q:"An object in SHM has amplitude 0.1 m and angular frequency 10 rad/s. What is its maximum velocity?", opts:["0.1 m/s","1 m/s","10 m/s","0.01 m/s"], ans:1, exp:"v_max = AѕЙ = 0.1 √Ч 10 = 1 m/s"},

  // THERMODYNAMICS
  {cat:"Thermo", q:"1200 J of heat is added to a gas which does 400 J of work. What is the increase in internal energy?", opts:["1600 J","800 J","400 J","1200 J"], ans:1, exp:"ќФU = Q - W = 1200 - 400 = 800 J"},
  {cat:"Thermo", q:"The temperature of a gas is 27¬∞C. What is this in Kelvin?", opts:["27 K","300 K","246 K","327 K"], ans:1, exp:"T(K) = T(¬∞C) + 273 = 27 + 273 = 300 K"},
  {cat:"Thermo", q:"A gas occupies 2 L at 300 K. At constant pressure, what volume does it occupy at 600 K?", opts:["4 L","1 L","3 L","6 L"], ans:0, exp:"Charles' Law: VвВБ/TвВБ = VвВВ/TвВВ вЖТ VвВВ = 2 √Ч 600/300 = 4 L"},
  {cat:"Thermo", q:"A gas at 2 atm and 3 L is compressed to 1 L at constant temperature. What is the new pressure?", opts:["1 atm","4 atm","6 atm","3 atm"], ans:2, exp:"Boyle's Law: PвВБVвВБ = PвВВVвВВ вЖТ PвВВ = 2 √Ч 3/1 = 6 atm"},

  // ELECTRICITY
  {cat:"Electricity", q:"A resistor of 10 ќ© carries 3 A current. What is the power dissipated?", opts:["30 W","90 W","300 W","0.3 W"], ans:1, exp:"P = I¬≤R = 9 √Ч 10 = 90 W"},
  {cat:"Electricity", q:"What is the equivalent resistance of 6 ќ© and 3 ќ© connected in parallel?", opts:["9 ќ©","2 ќ©","18 ќ©","4.5 ќ©"], ans:1, exp:"1/R = 1/6 + 1/3 = 1/6 + 2/6 = 3/6 = 1/2 вЖТ R = 2 ќ©"},
  {cat:"Electricity", q:"A charge of 20 C passes through a wire in 4 s. What is the current?", opts:["80 A","5 A","0.2 A","16 A"], ans:1, exp:"I = Q/t = 20/4 = 5 A"},
  {cat:"Electricity", q:"A 12 V battery drives current through a 4 ќ© resistor. What is the current?", opts:["48 A","0.33 A","3 A","8 A"], ans:2, exp:"I = V/R = 12/4 = 3 A"},
  {cat:"Electricity", q:"Two capacitors of 4 ќЉF each are connected in series. What is the combined capacitance?", opts:["8 ќЉF","2 ќЉF","4 ќЉF","1 ќЉF"], ans:1, exp:"1/C = 1/4 + 1/4 = 1/2 вЖТ C = 2 ќЉF"},

  // OPTICS
  {cat:"Optics", q:"Light travels from glass (n=1.5) to air (n=1). What is the critical angle? (sinвБї¬є(2/3)вЙИ42¬∞)", opts:["42¬∞","30¬∞","60¬∞","45¬∞"], ans:0, exp:"sinC = nвВВ/nвВБ = 1/1.5 = 0.667 вЖТ C = sinвБї¬є(0.667) вЙИ 42¬∞"},
  {cat:"Optics", q:"An object is placed 30 cm from a convex lens of focal length 10 cm. Where is the image?", opts:["15 cm","20 cm","10 cm","5 cm"], ans:0, exp:"1/v - 1/u = 1/f вЖТ 1/v = 1/10 + 1/(-30)... Using 1/v = 1/f + 1/u, 1/v = 1/10 - 1/30 = 2/30 вЖТ v = 15 cm"},
  {cat:"Optics", q:"The speed of light in a medium is 2√Ч10вБЄ m/s. What is its refractive index? (c = 3√Ч10вБЄ m/s)", opts:["1.5","0.67","2","1.0"], ans:0, exp:"n = c/v = 3√Ч10вБЄ / 2√Ч10вБЄ = 1.5"},
  {cat:"Optics", q:"Magnification of a mirror is вИТ3. If image distance is 30 cm, what is object distance?", opts:["90 cm","10 cm","вИТ10 cm","вИТ30 cm"], ans:1, exp:"m = вИТv/u вЖТ вИТ3 = вИТ30/u вЖТ u = 10 cm"},

  // NUCLEAR & MODERN
  {cat:"Modern", q:"The half-life of a radioactive substance is 10 years. After 30 years, what fraction remains?", opts:["1/2","1/4","1/8","1/16"], ans:2, exp:"Number of half-lives = 30/10 = 3. Fraction = (1/2)¬≥ = 1/8"},
  {cat:"Modern", q:"Energy of a photon with frequency 6√Ч10¬євБі Hz? (h = 6.6√Ч10вБї¬≥вБі J¬Јs)", opts:["3.96√Ч10вБї¬євБє J","6.6√Ч10вБї¬≥вБі J","9.9√Ч10вБї¬≤вБ∞ J","1√Ч10вБї¬євБє J"], ans:0, exp:"E = hf = 6.6√Ч10вБї¬≥вБі √Ч 6√Ч10¬євБі = 3.96√Ч10вБї¬євБє J"},
  {cat:"Modern", q:"An electron has KE = 2 eV. Convert to Joules. (1 eV = 1.6√Ч10вБї¬євБє J)", opts:["3.2√Ч10вБї¬євБє J","1.6√Ч10вБї¬євБє J","3.2√Ч10вБї¬євБЄ J","1.6√Ч10вБї¬євБЄ J"], ans:0, exp:"KE = 2 √Ч 1.6√Ч10вБї¬євБє = 3.2√Ч10вБї¬євБє J"},
  {cat:"Modern", q:"In a nuclear reaction, mass defect is 0.02 u. Find energy released. (1 u = 931.5 MeV)", opts:["18.63 MeV","9.315 MeV","186.3 MeV","93.15 MeV"], ans:0, exp:"E = ќФm √Ч 931.5 = 0.02 √Ч 931.5 = 18.63 MeV"},
  {cat:"Modern", q:"Work function of a metal is 2 eV. Photons of energy 5 eV hit it. What is the max KE of emitted electrons?", opts:["7 eV","3 eV","2 eV","5 eV"], ans:1, exp:"KE_max = E_photon - ѕЖ = 5 - 2 = 3 eV"},
];

const cats = ["All", ...new Set(questions.map(q => q.cat))];
let currentCat = "All";
let filtered = [];
let idx = 0;
let correct = 0, wrong = 0;
let answered = false;

function getFiltered() {
  return currentCat === "All" ? questions : questions.filter(q => q.cat === currentCat);
}

function buildTabs() {
  const tabs = document.getElementById("tabs");
  cats.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "tab" + (c === "All" ? " active" : "");
    btn.textContent = c;
    btn.onclick = () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      btn.classList.add("active");
      currentCat = c;
      restart();
    };
    tabs.appendChild(btn);
  });
}

function render() {
  const area = document.getElementById("quizArea");
  filtered = getFiltered();

  if (idx >= filtered.length) {
    area.innerHTML = "";
    showResults();
    return;
  }

  document.getElementById("results").style.display = "none";
  area.style.display = "block";

  const q = filtered[idx];
  answered = false;

  const keys = ["A","B","C","D"];
  const optsHtml = q.opts.map((o, i) =>
    `<div class="option" id="opt${i}" onclick="choose(${i})">
      <span class="opt-key">${keys[i]}</span>
      <span>${o}</span>
    </div>`
  ).join("");

  area.innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-number">Q${idx + 1} / ${filtered.length}</span>
        <span class="q-topic">${q.cat}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
      <div class="explanation" id="explanation">
        <strong>вЬУ Explanation</strong>${q.exp}
      </div>
      <button class="next-btn" id="nextBtn" onclick="next()">
        ${idx + 1 < filtered.length ? "Next Question вЖТ" : "See Results вЖТ"}
      </button>
    </div>
  `;
  updateScorebar();
}

function choose(i) {
  if (answered) return;
  answered = true;
  const q = filtered[idx];
  const opts = document.querySelectorAll(".option");
  opts.forEach(o => o.classList.add("disabled"));

  if (i === q.ans) {
    opts[i].classList.add("correct");
    correct++;
  } else {
    opts[i].classList.add("wrong");
    opts[q.ans].classList.add("correct");
    wrong++;
  }

  document.getElementById("explanation").classList.add("show");
  document.getElementById("nextBtn").classList.add("show");
  updateScorebar();
}

function next() {
  idx++;
  render();
}

function updateScorebar() {
  const total = filtered.length;
  const done = correct + wrong;
  document.getElementById("scoreVal").textContent = correct * 4 - wrong;
  document.getElementById("correctVal").textContent = correct;
  document.getElementById("wrongVal").textContent = wrong;
  document.getElementById("remainVal").textContent = total - done;
  document.getElementById("progressFill").style.width = (done / total * 100) + "%";
}

function showResults() {
  document.getElementById("results").style.display = "block";
  const total = filtered.length;
  const score = correct * 4 - wrong;
  const maxScore = total * 4;
  const pct = Math.round(correct / total * 100);
  document.getElementById("finalScore").textContent = score + " / " + maxScore;
  document.getElementById("finalCorrect").textContent = correct;
  document.getElementById("finalWrong").textContent = wrong;
  document.getElementById("finalPct").textContent = pct + "%";
}

function restart() {
  idx = 0; correct = 0; wrong = 0; answered = false;
  document.getElementById("results").style.display = "none";
  document.getElementById("quizArea").style.display = "block";
  render();
}

buildTabs();
render();
</script>
</body>
</html>
