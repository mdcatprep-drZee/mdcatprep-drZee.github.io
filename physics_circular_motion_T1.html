<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics NMDCAT Unit 3 - Rotational and Circular Motion</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2c3e50;
            --primary: #3498db;
            --secondary: #bdc3c7;
            --success: #2ecc71;
            --error: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .quiz-box {
            background: var(--card);
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 1rem;
        }
        #timer {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--error);
            background: #fff5f5;
            padding: 0.4rem 1rem;
            border-radius: 8px;
        }
        #progress {
            font-weight: 600;
            color: var(--primary);
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }
        .options-list {
            display: grid;
            gap: 0.75rem;
        }
        .option {
            border: 2px solid var(--secondary);
            border-radius: 10px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .option:hover {
            border-color: var(--primary);
            background: #f0f7ff;
        }
        .option.correct {
            border-color: var(--success) !important;
            background-color: #e8f8f0 !important;
            color: #1a5336;
        }
        .option.wrong {
            border-color: var(--error) !important;
            background-color: #fce8e8 !important;
            color: #721c24;
        }
        .option.disabled {
            pointer-events: none;
            opacity: 0.8;
        }
        .footer {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #result {
            display: none;
            text-align: center;
        }
        .score-num {
            font-size: 3rem;
            color: var(--primary);
            margin: 1rem 0;
            font-weight: 800;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="quiz-box" id="quiz-container">
    <div class="header">
        <div id="progress">Quest 1 / 50</div>
        <div id="timer">--:--</div>
    </div>
    
    <div id="q-area">
        <div class="question-text" id="q-txt">...</div>
        <div class="options-list" id="opt-list"></div>
    </div>

    <div class="footer">
        <button id="next-btn" onclick="next()" disabled>Next Question</button>
    </div>
</div>

<div class="quiz-box" id="result">
    <h2>Practice Set Completed</h2>
    <div class="score-num" id="score-val">0 / 50</div>
    <p id="stats-txt"></p>
    <button onclick="location.reload()" style="margin-top: 1rem;">Retry Quiz</button>
</div>

<script>
    const questions = [{"correct": 0, "options": ["4\u03c0\u00b2r\u00b2mn\u00b2", "4\u03c0\u00b2nr\u00b2m\u00b2", "4\u03c0\u00b2nrm", "4\u03c0\u00b2r\u00b2m"], "q": "Q.1 The centripetal force acting on a body of mass m revolving in a circle of radius r and completes n rev/sec, is"}, {"correct": 3, "options": ["Its velocity is constant", "Its acceleration is constant", "Its motion is linear", "Its motion is circular"], "q": "Q.2 A particle is acted upon by a force of constant magnitude which is always perpendicular to the velocity of the particle? The motion takes place in a plane. It follows that"}, {"correct": 1, "options": ["Gravitational forces of the earth are greater than the tension in the string", "The required centripetal force is greater than the tension sustained by the string", "The required centripetal force is less than the tension in the string", "The centripetal force is greater than the weight of the stone"], "q": "Q.3 A stone is tied to one end of a string... It breaks at some speed because"}, {"correct": 3, "options": ["At the bottom", "At the top", "Same at all point", "None of these"], "q": "Q.4 The body of mass m is rotating in vertical circle then tension in the string is maximum"}, {"correct": 0, "options": ["5m/s\u00b2", "25m/s\u00b2", "0.5 m/s\u00b2", "50 m/s\u00b2"], "q": "Q.5 A body of mass 10 kg, is moving with a velocity of 5 m/s in a circle of radius 5 m, what is the centripetal acceleration of the body?"}, {"correct": 0, "options": ["Energy is conserved", "Momentum is conserved", "Energy and momentum both are conserved", "None of the above is conserved"], "q": "Q.6 A particle moves with constant angular velocity in a circle. During the motion its"}, {"correct": 1, "options": ["30 N", "20 N", "10 N", "40 N"], "q": "Q.7 A body of mass 5 kg is moving in a circle of radius 1 m with an angular velocity of 2 rad/s. The centripetal force is"}, {"correct": 0, "options": ["7.0 m/s", "14\u03c0 rad/s", "7.0\u03c0 rad/s", "0.70 m/s"], "q": "Q.8 The figure shows a cylinder of radius 0.7 m rotating about its axis at 10 rad/s. The speed of the point P is:"}, {"correct": 1, "options": ["Scalar", "Vector", "Neither scalar nor vector", "None"], "q": "Q.9 For a small \u03b8, angular displacement is quantity"}, {"correct": 3, "options": ["10 m/s", "20 m/s", "100 m/s", "2 m/s"], "q": "Q.10 A body is whirled in a horizontal circle of radius 20 cm... angular velocity 10 rad/s. What is its linear velocity?"}, {"correct": 2, "options": ["Remains constant", "Becomes zero", "Changes continuously", "Always increases"], "q": "Q.11 When a body moves along a circular path, it velocity:"}, {"correct": 0, "options": ["1 rad", "One degree", "1 Revolution", "All"], "q": "Q.12 The angle subtended by an arc equal to radius is"}, {"correct": 1, "options": ["Linear velocity", "Speed", "Acceleration", "All of these"], "q": "Q.13 In uniform circular motion, the factor that remains constant is"}, {"correct": 2, "options": ["2", "3", "3/2", "1/2"], "q": "Q.14 The number of revolutions in 3\u03c0 radians"}, {"correct": 0, "options": ["mv\u00b2/r", "mv\u00b2/r + mg", "mv\u00b2/r - mg", "mg"], "q": "Q.15 The tension in the string revolving in a horizontal circle with a mass m is."}, {"correct": 1, "options": ["Gravitational force", "Centripetal force", "Frictional force", "Centrifugal acceleration"], "q": "Q.16 The curved flight of fighter planes at high speed requires a large"}, {"correct": 3, "options": ["10 rad/sec\u00b2", "1 rad/sec\u00b2", "2 rad/sec\u00b2", "20 rad/sec\u00b2"], "q": "Q.17 The linear acceleration of a car is 10m/s\u00b2. If wheels have diameter 1m, angular acceleration will be"}, {"correct": 1, "options": ["100 N", "1000 N", "1 N", "Zero"], "q": "Q.18 The force required to move a body of mass 1 kg with velocity 10ms\u207b\u00b9 along path of radius 0.1m is"}, {"correct": 3, "options": ["1 radian", "2 radian", "4 radian", "2\u03c0 rad"], "q": "Q.19 2\u03c0r subtends an angle of"}, {"correct": 1, "options": ["2F\u2081", "F\u2081/2", "4F\u2081", "F\u2081/4"], "q": "Q.20 If radius becomes two times, the centripetal force required (for constant velocity) becomes:"}, {"correct": 1, "options": ["18 N", "108 N", "217 N", "277 N"], "q": "Q.21 A ball of mass 1.5 kg... speed 12ms\u207b\u00b9. Radius 2.0m. What is maximum tension?"}, {"correct": 1, "options": ["A force always tangent", "Force of constant magnitude directed toward fixed point", "Force of constant magnitude directed away", "Acceleration tangent"], "q": "Q.22 Uniform circular motion is the direct consequence of"}, {"correct": 1, "options": ["5\u03c0 radian", "20\u03c0 radian", "15\u03c0 radian", "10\u03c0 radian"], "q": "Q.23 A wheel rotates with constant angular velocity of 600 r.p.m. Angle in one second?"}, {"correct": 3, "options": ["F = (mv\u00b2/r)r\u0302", "F = (mv\u00b2/r\u00b2)r\u0302", "F = mrw\u00b2r\u0302", "F = mrw\u00b2(-r\u0302)"], "q": "Q.24 Correct formula of centripetal force?"}, {"correct": 3, "options": ["\u03c0", "3\u03c0", "6\u03c0", "12\u03c0"], "q": "Q.25 Shaft rotates 360rev/min. Angle in 1 sec in radian is"}, {"correct": 3, "options": ["Vibratory", "Linear", "Rotatory", "Angular motion"], "q": "Q.26 When a body covers a certain angle in a given interval. Such type of motion is"}, {"correct": 3, "options": ["40 rev", "20 rev", "30 rad", "40 rad"], "q": "Q.27 In graph (w=10, t=4), angular displacement is:"}, {"correct": 1, "options": ["4 rad/s", "5 rad/s", "6 rad/s", "7 rad/s"], "q": "Q.28 Speed 2m/s, radius 0.4 m. Angular speed is:"}, {"correct": 0, "options": ["Zero", "Constant", "Infinite", "None"], "q": "Q.29 If particle moves with uniform speed, tangential acceleration is:"}, {"correct": 3, "options": ["v\u00b2/r", "v\u03c9", "r\u03c9\u00b2", "All of these"], "q": "Q.30 Centripetal acceleration can be expressed as"}, {"correct": 1, "options": ["Centripetal force", "Centrifugal force", "Gravitational force", "All"], "q": "Q.31 Car turn. A force acts on it outwardly because of"}, {"correct": 1, "options": ["90\u00b0", "180\u00b0", "0\u00b0", "45\u00b0"], "q": "Q.32 Angle between centripetal acceleration and radius vector is"}, {"correct": 3, "options": ["Maximum", "Remains same", "Minimum", "Zero"], "q": "Q.33 Work done due to centripetal force is"}, {"correct": 1, "options": ["30 rad/s\u00b2", "3.14 rad/s\u00b2", "30 rev/s\u00b2", "50 rev/min\u00b2"], "q": "Q.34 Average angular acceleration (Initial 0, 10s later 300rev/min):"}, {"correct": 2, "options": ["250km/s\u00b2", "75m/s\u00b2", "62.5m/s\u00b2", "60m/s\u00b2"], "q": "Q.35 Aircraft loop r=1km, speed 900 km/h. Centripetal acceleration?"}, {"correct": 1, "options": ["0.3 rad/s", "30 rad/s", "3 rad s\u207b\u00b9", "1.5 rad/s"], "q": "Q.36 Speed 3m/s, distance 0.1m. Angular speed?"}, {"correct": 3, "options": ["alpha and a", "r and a", "r and alpha", "All of these"], "q": "Q.37 In a = alpha x r, 90\u00b0 is angle between"}, {"correct": 0, "options": ["Speed", "Axis of rotation", "Angular displacement", "Direction of angular velocity"], "q": "Q.38 All particles of rigid body... may NOT have same:"}, {"correct": 0, "options": ["Zero", "Negative", "Infinity", "Positive"], "q": "Q.39 Torque due to centripetal force is"}, {"correct": 3, "options": ["600", "1500", "1000", "2000"], "q": "Q.40 Speed 100 rps to 300 rps in 10s. Number of revolutions?"}, {"correct": 3, "options": ["1.4 m/s", "0.11 m/s", "28 m/s", "4.4 m/s"], "q": "Q.41 Wheel r=0.7, w=6.3. Linear speed?"}, {"correct": 3, "options": ["x-axis", "y-axis", "z-axis", "The axis of rotation"], "q": "Q.42 Direction of angular acceleration is always along:"}, {"correct": 3, "options": ["2\u03c0 rads\u207b\u00b9", "\u03c0 rads\u207b\u00b9", "\u03c0/60 rads\u207b\u00b9", "\u03c0/1800 rads\u207b\u00b9"], "q": "Q.43 Angular velocity of minute hand of clock:"}, {"correct": 1, "options": ["Acceleration and displacement", "Resultant force and acceleration", "Acceleration and velocity", "Resultant force and velocity"], "q": "Q.44 Satellite in circular orbit. Which two quantities are in same direction?"}, {"correct": 0, "options": ["1 m", "0.5 m", "4 m", "2 m"], "q": "Q.45 w=2rad/s, v=2ms\u207b\u00b9, radius of circle is:"}, {"correct": 1, "options": ["Acc. constant in direction", "Acc. constant in size but not in direction", "Grav. P.E. varies", "Velocity constant"], "q": "Q.46 Satellite in circular orbit round planet. Correct statement:"}, {"correct": 1, "options": ["\u03c0/43200 rad/s", "\u03c0/21600 rad/s", "\u03c0/30 rad/s", "\u03c0/1800 rad/s"], "q": "Q.47 Angular velocity of an hour hand of a watch"}, {"correct": 2, "options": ["1.66 rad/s", "10.47 deg/s", "10.47 rad/s", "60 deg/s"], "q": "Q.48 The angular velocity of a particle rotating in a circular orbit 100 times per minute is"}, {"correct": 1, "options": ["Constant linear velocity", "Constant angular velocity", "Constant acceleration", "Constant force"], "q": "Q.49 A motor cyclist going around in a circular track at constant speed"}, {"correct": 3, "options": ["30\u00b0", "60\u00b0", "90\u00b0", "360\u00b0"], "q": "Q.50 Angle swept by minute hand in one complete rotation is"}];

    let current = 0;
    let score = 0;
    let totalTime = questions.length * 60;
    let timeRemaining = questions.length * 60;
    let timerID;

    function startTimer() {
        updateTimerUI();
        timerID = setInterval(() => {
            timeRemaining--;
            updateTimerUI();
            if (timeRemaining <= 0) {
                clearInterval(timerID);
                showResult("Time's Over!");
            }
        }, 1000);
    }

    function updateTimerUI() {
        const m = Math.floor(timeRemaining / 60);
        const s = timeRemaining % 60;
        document.getElementById('timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function loadQuestion() {
        const q = questions[current];
        document.getElementById('progress').innerText = `Quest ${current + 1} / ${questions.length}`;
        document.getElementById('q-txt').innerText = q.q;
        
        const list = document.getElementById('opt-list');
        list.innerHTML = '';
        
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => selectOpt(idx, q.correct, div);
            list.appendChild(div);
        });
        document.getElementById('next-btn').disabled = true;
    }

    function selectOpt(index, correct, el) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((o, i) => {
            o.classList.add('disabled');
            if (i === correct) o.classList.add('correct');
        });

        if (index === correct) {
            score++;
        } else {
            el.classList.add('wrong');
        }
        document.getElementById('next-btn').disabled = false;
    }

    function next() {
        current++;
        if (current < questions.length) {
            loadQuestion();
        } else {
            showResult("Completed!");
        }
    }

    function showResult(title) {
        clearInterval(timerID);
        document.getElementById('quiz-container').classList.add('hidden');
        const res = document.getElementById('result');
        res.style.display = 'block';
        res.querySelector('h2').innerText = title;
        document.getElementById('score-val').innerText = `${score} / ${questions.length}`;
        const timeTaken = totalTime - timeRemaining;
        const mm = Math.floor(timeTaken / 60), ss = timeTaken % 60;
        document.getElementById('stats-txt').innerText = `Time: ${mm}m ${ss}s | Accuracy: ${Math.round((score/questions.length)*100)}%`;
    }

    startTimer();
    loadQuestion();
</script>

</body>
</html>
