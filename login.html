<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — MDCAT Prep by Dr. Zee</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f1e; --surface: #111827; --card: #151e2e;
      --border: rgba(255,255,255,0.08); --accent: #00d4aa;
      --accent2: #4f8ef7; --text: #e8edf5; --muted: #7a8599;
      --error: #f75c5c; --success: #5cf7b0;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.2; pointer-events: none; }
    .orb1 { width: 350px; height: 350px; background: var(--accent); top: -80px; left: -80px; }
    .orb2 { width: 250px; height: 250px; background: var(--accent2); bottom: -60px; right: -60px; }
    .container { width: 100%; max-width: 420px; position: relative; z-index: 1; animation: fadeUp 0.5s ease both; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon { width: 56px; height: 56px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 26px; margin-bottom: 12px; }
    .logo h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; }
    .logo h1 span { color: var(--accent); }
    .logo p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; }
    .tabs { display: flex; background: var(--surface); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
    .tab { flex: 1; padding: 10px; border: none; background: transparent; color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.88rem; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
    .tab.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #0a0f1e; }
    .form { display: none; }
    .form.active { display: block; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.03em; }
    .field input, .field select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.92rem; outline: none; transition: border-color 0.2s; }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field select option { background: var(--surface); }
    .btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; color: #0a0f1e; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; cursor: pointer; margin-top: 8px; transition: opacity 0.2s, transform 0.1s; }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Google Button */
    .google-btn { width: 100%; padding: 13px; background: #fff; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: #1f1f1f; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.92rem; cursor: pointer; margin-top: 12px; transition: opacity 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .google-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .google-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .google-icon { width: 20px; height: 20px; flex-shrink: 0; }

    .divider { text-align: center; color: var(--muted); font-size: 0.78rem; margin: 18px 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border); }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .msg { margin-top: 14px; padding: 10px 14px; border-radius: 10px; font-size: 0.83rem; text-align: center; display: none; }
    .msg.error { background: rgba(247,92,92,0.1); border: 1px solid rgba(247,92,92,0.3); color: var(--error); display: block; }
    .msg.success { background: rgba(92,247,176,0.1); border: 1px solid rgba(92,247,176,0.3); color: var(--success); display: block; }

    .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #0a0f1e; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    .loading-white { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #333; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }

    /* Google popup note */
    .popup-note { font-size: 0.75rem; color: var(--muted); text-align: center; margin-top: 10px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="container">
    <div class="logo">
      <div class="logo-icon">🩺</div>
      <h1>MDCAT<span>Prep</span></h1>
      <p>by Dr. Zee — 2025 Edition</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div class="form active" id="loginForm">
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="your@email.com"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="••••••••"/>
        </div>
        <button class="btn" id="loginBtn" onclick="doLogin()">Login to My Account</button>
        <div class="divider">or</div>
        <button class="google-btn" id="googleLoginBtn" onclick="doGoogleSignIn()">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
        <p class="popup-note">A popup will open to sign in with Google</p>
        <div class="msg" id="loginMsg"></div>
      </div>

      <!-- REGISTER FORM -->
      <div class="form" id="registerForm">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Muhammad Ali"/>
        </div>
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="your@email.com"/>
        </div>
        <div class="field">
          <label>Phone Number</label>
          <input type="tel" id="regPhone" placeholder="03001234567"/>
        </div>
        <div class="field">
          <label>City</label>
          <input type="text" id="regCity" placeholder="Lahore"/>
        </div>
        <div class="field">
          <label>Target Score</label>
          <select id="regTarget">
            <option value="">Select target</option>
            <option>150+</option>
            <option>160+</option>
            <option>170+</option>
            <option>180+</option>
            <option>190+</option>
          </select>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="regPass" placeholder="Min 6 characters"/>
        </div>
        <button class="btn" id="registerBtn" onclick="doRegister()">Create My Account</button>
        <div class="divider">or</div>
        <button class="google-btn" id="googleRegBtn" onclick="doGoogleSignIn()">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign up with Google
        </button>
        <p class="popup-note">Quick signup — no password needed!</p>
        <div class="msg" id="registerMsg"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAqLKpVldxBvGnIgVK6N2BAjmIHRNNZ3dw",
      authDomain: "mdcat-prep-drzee.firebaseapp.com",
      projectId: "mdcat-prep-drzee",
      storageBucket: "mdcat-prep-drzee.firebasestorage.app",
      messagingSenderId: "722650911656",
      appId: "1:722650911656:web:1e315f68c14aedeb8f439d",
      measurementId: "G-LFSJYL5YYQ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    // Redirect if already logged in
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'index.html';
    });

    window.switchTab = (tab) => {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
      document.getElementById('loginForm').classList.toggle('active', tab==='login');
      document.getElementById('registerForm').classList.toggle('active', tab==='register');
    };

    // ── EMAIL LOGIN ──
    window.doLogin = async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('loginMsg');
      msg.className = 'msg';
      if (!email || !pass) { msg.className='msg error'; msg.textContent='Please fill all fields.'; return; }
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>Logging in...';
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = 'index.html';
      } catch(e) {
        msg.className = 'msg error';
        msg.textContent = e.code === 'auth/invalid-credential' ? 'Wrong email or password.' : 'Login failed. Try again.';
        btn.disabled = false;
        btn.textContent = 'Login to My Account';
      }
    };

    // ── EMAIL REGISTER ──
    window.doRegister = async () => {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const city = document.getElementById('regCity').value.trim();
      const target = document.getElementById('regTarget').value;
      const pass = document.getElementById('regPass').value;
      const btn = document.getElementById('registerBtn');
      const msg = document.getElementById('registerMsg');
      msg.className = 'msg';
      if (!name||!email||!phone||!city||!target||!pass) { msg.className='msg error'; msg.textContent='Please fill all fields.'; return; }
      if (pass.length < 6) { msg.className='msg error'; msg.textContent='Password must be at least 6 characters.'; return; }
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>Creating account...';
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await setDoc(doc(db, 'students', cred.user.uid), {
          name, email, phone, city, targetScore: target,
          signupMethod: 'email',
          joinedAt: serverTimestamp(), quizScores: [], lastActive: serverTimestamp()
        });
        window.location.href = 'index.html';
      } catch(e) {
        msg.className = 'msg error';
        msg.textContent = e.code === 'auth/email-already-in-use' ? 'Email already registered. Please login.' : 'Registration failed. Try again.';
        btn.disabled = false;
        btn.textContent = 'Create My Account';
      }
    };

    // ── GOOGLE SIGN IN ──
    window.doGoogleSignIn = async () => {
      const isLoginTab = document.getElementById('loginForm').classList.contains('active');
      const btnId = isLoginTab ? 'googleLoginBtn' : 'googleRegBtn';
      const msgId = isLoginTab ? 'loginMsg' : 'registerMsg';
      const btn = document.getElementById(btnId);
      const msg = document.getElementById(msgId);
      msg.className = 'msg';
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-white"></span>Opening Google...';
      try {
        const result = await signInWithPopup(auth, googleProvider);
        const user = result.user;
        // Check if student already exists in Firestore
        const snap = await getDoc(doc(db, 'students', user.uid));
        if (!snap.exists()) {
          // New student — save their data
          await setDoc(doc(db, 'students', user.uid), {
            name: user.displayName || 'Student',
            email: user.email,
            phone: 'Not provided',
            city: 'Not provided',
            targetScore: 'Not set',
            signupMethod: 'google',
            joinedAt: serverTimestamp(),
            quizScores: [],
            lastActive: serverTimestamp()
          });
        }
        window.location.href = 'index.html';
      } catch(e) {
        msg.className = 'msg error';
        if (e.code === 'auth/popup-closed-by-user') {
          msg.textContent = 'Google sign-in was cancelled.';
        } else if (e.code === 'auth/popup-blocked') {
          msg.textContent = 'Popup blocked! Please allow popups for this site.';
        } else {
          msg.textContent = 'Google sign-in failed. Try again.';
        }
        btn.disabled = false;
        btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>${isLoginTab ? 'Continue with Google' : 'Sign up with Google'}`;
      }
    };

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('loginForm').classList.contains('active')) doLogin();
        else doRegister();
      }
    });
  </script>
</body>
</html>
