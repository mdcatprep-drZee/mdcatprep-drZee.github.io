<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology NMDCAT Quiz - Full Section</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .quiz-container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
        }
        #timer {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--error-color);
            background: #ffeaea;
            padding: 5px 15px;
            border-radius: 8px;
        }
        .question-box {
            min-height: 250px;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            line-height: 1.4;
        }
        .options {
            display: grid;
            gap: 12px;
        }
        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        .option:hover {
            border-color: var(--secondary-color);
            background-color: #f0faff;
        }
        .option.correct {
            background-color: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724;
            pointer-events: none;
        }
        .option.wrong {
            background-color: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
            pointer-events: none;
        }
        .option.disabled {
            pointer-events: none;
            opacity: 0.8;
        }
        .footer {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            background-color: var(--secondary-color);
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        #result-screen { text-align: center; display: none; }
        .score-big { font-size: 3rem; color: var(--secondary-color); margin: 20px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-screen">
    <div class="header">
        <div id="progress">Question 1 / 53</div>
        <div id="timer">--:--</div>
    </div>

    <div class="question-box">
        <div id="question" class="question-text"></div>
        <div id="options" class="options"></div>
    </div>

    <div class="footer">
        <div id="status-msg">Select an answer</div>
        <button id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
    </div>
</div>

<div class="quiz-container" id="result-screen">
    <h2>Test Completed!</h2>
    <div class="score-big" id="final-score">0 / 0</div>
    <p id="time-taken"></p>
    <p id="accuracy-msg"></p>
    <button onclick="location.reload()">Restart Quiz</button>
</div>

<script>
    const questions = [
        {"q": "Q.46 ATP consumption and production are associated with:", "options": ["Glycolysis", "Krebs cycle", "Electron transport chain", "Pyruvic acid oxidation"], "correct": 0},
        {"q": "Q.47 Correct sequence of utilization of biomolecules for the production of energy in our body is:", "options": ["Carbohydrates → Lipids → Proteins", "Carbohydrates → Proteins → Lipids", "Lipids → Proteins → Carbohydrates", "Proteins → Lipids → Carbohydrates"], "correct": 0},
        {"q": "Q.48 In oxidative phosphorylation, cytochrome a is oxidized by:", "options": ["Co enzyme Q", "Cytochrome 'b'", "Cytochrome 'a3'", "Cytochrome 'c'"], "correct": 2},
        {"q": "Q.49 Total number of CO2 molecules released by oxidation of glucose through Krebs cycle:", "options": ["2", "3", "4", "6"], "correct": 2},
        {"q": "Q.50 Which of the following correctly represents the end product (net) of glycolysis? (ATP, NADH, H2O)", "options": ["4, 4, 4", "2, 2, 2", "4, 2, 4", "2, 4, 2"], "correct": 1},
        {"q": "Q.51 All of the following are associated with light reaction except:", "options": ["Breakdown of water", "Fixation of CO2", "Excitation of electrons", "Formation of NADPH"], "correct": 1},
        {"q": "Q.52 A process that uses membranes to couple redox reactions to ATP synthesis is called:", "options": ["Osmosis", "Active transport", "Chemiosmosis", "Krebs cycle"], "correct": 2},
        {"q": "Q.53 It structurally resembles with haeme portion of haemoglobin:", "options": ["Porphyrin", "Phytol", "Pyrrole", "Phytochrome"], "correct": 0},
        {"q": "Q.54 Most common type of cellular respiration in our muscles is:", "options": ["Alcoholic fermentation", "Aerobic respiration", "Lactic acid fermentation", "Anaerobic respiration"], "correct": 1},
        {"q": "Q.55 CO2 in atmosphere remains relatively constant because:", "options": ["Respiration/Photosynthesis balance", "Conversion to Carbohydrates", "Conversion to CaCO3", "Atmospheric Bacteria"], "correct": 0},
        {"q": "Q.56 Photosystems occur in:", "options": ["Stroma", "Chloroplast envelope", "Grana", "Thylakoid interior space"], "correct": 2},
        {"q": "Q.57 During Aerobic respiration, protons are diffused from:", "options": ["Matrix to inter-membranous space", "Inter-membranous space to matrix", "Stroma to thylakoid lumen", "Thylakoid lumen to stroma"], "correct": 1},
        {"q": "Q.58 Dihydroxyacetone phosphate is an isomer of:", "options": ["RuP", "PGA", "G3P", "PEP"], "correct": 2},
        {"q": "Q.59 Most efficient wavelength to carry out photosynthesis is of:", "options": ["Green colour", "Blue colour", "Red colour", "Orange colour"], "correct": 2},
        {"q": "Q.60 At 500 nm, most of the light is absorbed by:", "options": ["Chlorophyll a", "Carotenoids", "Chlorophyll b", "Chlorophyll c"], "correct": 1},
        {"q": "Q.61 Which of the following is intermediate in carbohydrates and fats metabolism?", "options": ["CO2", "Acetyl Co-A", "Pyruvic acid", "G3P"], "correct": 1},
        {"q": "Q.62 In Krebs cycle, the H atoms removed at succinate level, are accepted by:", "options": ["FAD", "ADP", "NADP", "NAD"], "correct": 0},
        {"q": "Q.63 Number of which of the following is same in chlorophyll a and b?", "options": ["C and H", "C and O", "H and O", "C and N"], "correct": 3},
        {"q": "Q.64 Increased level of ATP during aerobic respiration can inhibit the functioning of:", "options": ["Hexokinase", "Pyruvate decarboxylase", "Citrate synthase", "Phosphofructokinase"], "correct": 3},
        {"q": "Q.65 Both respiration and photosynthesis require:", "options": ["Organic fuel", "Sunlight", "Cytochromes", "C-C energy"], "correct": 2},
        {"q": "Q.66 Most of Krebs cycle's enzymes are located in/at:", "options": ["Mitochondrial matrix", "Cristae", "Outer mitochondrial membrane", "Inter-membranous space"], "correct": 0},
        {"q": "Q.67 Yeast cell respires through:", "options": ["Aerobically only", "Both aerobically and anaerobically", "Anaerobically only", "In a unique way"], "correct": 1},
        {"q": "Q.68 Calvin cycle is commonly known as:", "options": ["C3 pathway", "C4 pathway", "Glucose pathway", "Aerobic cycle"], "correct": 0},
        {"q": "Q.69 Stage till which aerobic respiration and fermentation are same:", "options": ["DAP formation", "3PG formation", "Pyruvate formation", "Acetyl CoA formation"], "correct": 2},
        {"q": "Q.70 Which one of these is a '5C' compound?", "options": ["Succinate", "α-ketoglutarate", "Citrate", "Malate"], "correct": 1},
        {"q": "Q.71 The number of chloroplasts per square millimeter of leaf is about:", "options": ["Half million", "Two million", "One million", "One billion"], "correct": 0},
        {"q": "Q.72 Unstacked thylakoid membranes are found in:", "options": ["Chloroplasts", "Prokaryotes", "Eukaryotes", "Grana"], "correct": 0},
        {"q": "Q.73 Spectrophotometer measures relative abilities of pigments to absorb:", "options": ["Intensities", "Quantities", "Qualities", "Durations"], "correct": 2},
        {"q": "Q.74 Pigments absorb light of _________ nm wavelength:", "options": ["300 – 700", "380 – 750", "350 – 750", "400 – 800"], "correct": 1},
        {"q": "Q.75 The enzymes related to glycolysis are:", "options": ["Mitochondrial membrane", "Mitochondrial cristae", "Nucleoplasm", "Cytoplasm"], "correct": 3},
        {"q": "Q.76 EXCEPT photosynthetic bacteria, all photoautotrophs contain:", "options": ["Chlorophyll b", "Chlorophyll a", "Chlorophyll c", "Bacteriochlorophyll"], "correct": 1},
        {"q": "Q.77 Pick the molecular formula of chlorophyll b:", "options": ["C55H70O6N4Mg", "C55H70O5N4Ca", "C55H72O5N4Mg", "C55H70O5N4K"], "correct": 0},
        {"q": "Q.78 Chlorophyll a is __________ while chlorophyll b is ________:", "options": ["Blue – Green, Yellow – Green", "Violet – Green, Orange – Yellow", "Yellow – Green, Blue – Green", "Orange – Yellow, Violet – Green"], "correct": 0},
        {"q": "Q.79 Porphyrin ring of chlorophyll contains ________, Whereas hemoglobin contains _________:", "options": ["Magnesium, Iron", "Potassium, Iron", "Iron, Magnesium", "Iron, Potassium"], "correct": 0},
        {"q": "Q.80 More photosynthesis occurs in ________ part of spectrum?", "options": ["Blue", "Violet", "Red", "Green"], "correct": 2},
        {"q": "Q.81 Antenna complex components EXCEPT:", "options": ["Chlorophyll a", "Carotenoids", "Chlorophyll b", "Reaction centre"], "correct": 3},
        {"q": "Q.82 Reaction center molecules are linked to:", "options": ["Chlorophyll a", "Carotenoids", "Chlorophyll b", "Xanthophylls"], "correct": 0},
        {"q": "Q.83 Atmospheric oxygen is replenished by:", "options": ["Electrolysis", "Photolysis of water", "Hydrolysis of water", "CO2 Hydrolysis"], "correct": 1},
        {"q": "Q.84 Photophosphorylation NEVER results in production of:", "options": ["NADPH", "ATP", "Oxygen", "Water"], "correct": 3},
        {"q": "Q.85 Light reaction ATP synthesis is called:", "options": ["Oxidative phos.", "Photophosphorylation", "Substrate phos.", "Glucose phos."], "correct": 1},
        {"q": "Q.86 Light absorbing part of chlorophyll:", "options": ["Phytol tail", "Pyrrole ring", "Porphyrin head", "Thylakoid"], "correct": 2},
        {"q": "Q.87 Sequence of non-cyclic electron flow:", "options": ["Cyt-PQ-PC", "PQ-Cyt-PC", "PC-PQ-Cyt", "PC-Cyt-PQ"], "correct": 1},
        {"q": "Q.88 Dark reactions take place in:", "options": ["Matrix", "Stroma", "Grana", "Thylakoid"], "correct": 1},
        {"q": "Q.89 ATP more than NADPH in Calvin cycle:", "options": ["Nine", "Three", "Six", "Nil"], "correct": 1},
        {"q": "Q.90 Membrane-coupled redox reaction for ATP:", "options": ["Phosphorylation", "Chemiosmosis", "Non-cyclic", "Oxidative phos."], "correct": 1},
        {"q": "Q.91 Glycolysis phases (respectively):", "options": ["Oxidative, Prep", "C-Fix, Red", "Prep, Oxidative", "Red, C-Fix"], "correct": 2},
        {"q": "Q.92 Most abundant protein on earth:", "options": ["Ribulose", "Hemoglobin", "Rubisco", "Collagen"], "correct": 2},
        {"q": "Q.93 NADPH use in Calvin cycle:", "options": ["C-Fixation", "Regeneration", "Reduction", "Oxidation"], "correct": 2},
        {"q": "Q.94 C3 pathway name origin:", "options": ["3C Yielded", "3 CO2 fixed", "First stable 3C compound", "3 RuBP used"], "correct": 2},
        {"q": "Q.95 PG to PEP conversion via:", "options": ["Hydration", "Oxidation", "Dehydration", "Reduction"], "correct": 2},
        {"q": "Q.96 RuBP regenerated from:", "options": ["4 G3P", "6 G3P", "3 G3P", "5 G3P"], "correct": 3},
        {"q": "Q.97 Prep phase ATP utilization:", "options": ["2", "6", "4", "8"], "correct": 0},
        {"q": "Q.98 Single NADH in ETC produces:", "options": ["6 ATP", "4 ATP", "2 ATP", "3 ATP"], "correct": 3}
    ];

    let currentIdx = 0;
    let score = 0;
    let timeRemaining = questions.length * 60; // 1 minute per MCQ
    let totalTime = questions.length * 60;
    let timerID;

    function startTimer() {
        timerID = setInterval(() => {
            timeRemaining--;
            updateTimerDisplay();
            if (timeRemaining <= 0) {
                clearInterval(timerID);
                showResults("Time Over!");
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const mins = Math.floor(timeRemaining / 60);
        const secs = timeRemaining % 60;
        document.getElementById('timer').innerText = 
            `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById('progress').innerText = `Question ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('question').innerText = q.q;
        document.getElementById('status-msg').innerText = "Select an answer";
        
        const optContainer = document.getElementById('options');
        optContainer.innerHTML = '';
        
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => handleSelect(idx, div);
            optContainer.appendChild(div);
        });
        document.getElementById('next-btn').disabled = true;
    }

    function handleSelect(idx, element) {
        const correctIdx = questions[currentIdx].correct;
        const opts = document.querySelectorAll('.option');
        
        opts.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (i === correctIdx) opt.classList.add('correct');
        });

        if (idx === correctIdx) {
            score++;
            document.getElementById('status-msg').innerHTML = "<span style='color:green'>Correct!</span>";
        } else {
            element.classList.add('wrong');
            document.getElementById('status-msg').innerHTML = "<span style='color:red'>Incorrect!</span>";
        }

        document.getElementById('next-btn').disabled = false;
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults("Finished!");
        }
    }

    function showResults(msg) {
        clearInterval(timerID);
        document.getElementById('quiz-screen').classList.add('hidden');
        const res = document.getElementById('result-screen');
        res.style.display = 'block';
        res.querySelector('h2').innerText = msg;
        document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
        const timeTaken = totalTime - timeRemaining;
        const mm = Math.floor(timeTaken / 60), ss = timeTaken % 60;
        document.getElementById('time-taken').innerText = `Time spent: ${mm}m ${ss}s`;
        document.getElementById('accuracy-msg').innerText = `Accuracy: ${Math.round((score/questions.length)*100)}%`;
    }

    // Init
    updateTimerDisplay();
    startTimer();
    loadQuestion();
</script>

</body>
</html>
